name: IPAKeyboard
options:
  bundleIdPrefix: com.minhphan
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.4"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_BITCODE: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO

targets:
  IPAKeyboardApp:
    type: application
    platform: iOS
    sources:
      - path: IPAKeyboardApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minhphan.ipa-keyboard-ios
        PRODUCT_NAME: IPAKeyboardApp
        INFOPLIST_FILE: IPAKeyboardApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: IPAKeyboardApp/IPAKeyboardApp.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - target: IPAKeyboardExtension
        embed: true
        codeSign: true

  IPAKeyboardExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: IPAKeyboardExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minhphan.ipa-keyboard-ios.keyboard
        PRODUCT_NAME: IPAKeyboardExtension
        INFOPLIST_FILE: IPAKeyboardExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: IPAKeyboardExtension/IPAKeyboardExtension.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO

  IPAKeyboardAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IPAKeyboardAppTests
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/IPAKeyboardApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/IPAKeyboardApp"
    dependencies:
      - target: IPAKeyboardApp

schemes:
  IPAKeyboardApp:
    build:
      targets:
        IPAKeyboardApp: all
        IPAKeyboardExtension: all
    test:
      targets:
        - IPAKeyboardAppTests
